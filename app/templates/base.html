<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TalkFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topo">
    <div class="marca">
      <span class="logo-passaro" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <ellipse cx="14" cy="14" rx="8.5" ry="6.2" fill="#7c3aed"/>
          <circle cx="7.5" cy="9.5" r="4.6" fill="#7c3aed"/>
          <polygon points="1.5,9.5 5.5,7.7 5.5,11.3" fill="#64748b"/>
          <ellipse cx="15" cy="16" rx="5.5" ry="3.8" fill="#facc15"/>
          <circle cx="8" cy="8.3" r="1.1" fill="#fff"/>
          <circle cx="8.2" cy="8.3" r="0.55" fill="#0f172a"/>
          <path d="M12 20.2v2.2M15.5 20.2v2.2" stroke="#0f172a" stroke-width="1.1" stroke-linecap="round"/>
        </svg>
      </span>
      <h1>TalkFlow</h1>
    </div>
    <nav>
      <a href="/contatos" class="{{ 'ativo' if pilar == 'contato' else '' }}">Contatos</a>
      <a href="/tarefas" class="{{ 'ativo' if pilar == 'tarefa' else '' }}">Tarefas</a>
    </nav>
  </header>

  <main data-pilar="{{ pilar }}">
    {% block conteudo %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="/static/kanban.js"></script>
</body>
</html>
