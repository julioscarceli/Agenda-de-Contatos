<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TalkFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topo">
    <div class="marca">
      <span class="logo-passaro" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <ellipse cx="12" cy="14" rx="7.2" ry="7.6" fill="currentColor"/>
          <polygon points="5.5,7.5 7.8,2.5 10,7.5" fill="currentColor"/>
          <polygon points="14,7.5 16.2,2.5 18.5,7.5" fill="currentColor"/>
          <circle cx="9" cy="13" r="3.1" fill="#fff"/>
          <circle cx="15" cy="13" r="3.1" fill="#fff"/>
          <circle cx="9" cy="13" r="1.4" fill="#0f172a"/>
          <circle cx="15" cy="13" r="1.4" fill="#0f172a"/>
          <polygon points="11,16 13,16 12,18.3" fill="#0f172a"/>
        </svg>
      </span>
      <h1>TalkFlow</h1>
    </div>
    <nav>
      <a href="/contatos" class="{{ 'ativo' if pilar == 'contato' else '' }}">Contatos</a>
      <a href="/tarefas" class="{{ 'ativo' if pilar == 'tarefa' else '' }}">Tarefas</a>
    </nav>
  </header>

  <main data-pilar="{{ pilar }}">
    {% block conteudo %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="/static/kanban.js"></script>
</body>
</html>
