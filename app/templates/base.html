<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TalkFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topo">
    <div class="marca">
      <span class="logo-passaro" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M3.5 13.5c0-4.4 3.4-7.8 7.7-7.8 1.1 0 2.2.25 3.1.7.9-1.1 2.2-1.9 3.7-2.1-.3 1-.9 1.9-1.7 2.6.6.9.9 2 .9 3.1 0 4.9-4.3 9-9.7 9-2.1 0-4.1-.6-5.7-1.7 1 0 1.9-.3 2.6-.9-1.7-.2-3-1.4-2.9-2.9z"/>
          <circle cx="16.3" cy="9.3" r="1" fill="#fff"/>
        </svg>
      </span>
      <h1>TalkFlow</h1>
    </div>
    <nav>
      <a href="/contatos" class="{{ 'ativo' if pilar == 'contato' else '' }}">Contatos</a>
      <a href="/tarefas" class="{{ 'ativo' if pilar == 'tarefa' else '' }}">Tarefas</a>
    </nav>
  </header>

  <main data-pilar="{{ pilar }}">
    {% block conteudo %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="/static/kanban.js"></script>
</body>
</html>
